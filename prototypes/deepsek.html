<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kukplen - Meal Planning for Busy People</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #292F36;
            --light: #F7FFF7;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f5f5;
            color: var(--dark);
        }
        
        .navbar {
            background: linear-gradient(135deg, var(--primary), #FF8E8E);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .btn-primary {
            background-color: var(--primary);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #ff5252;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background-color: var(--secondary);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: #3dbeb6;
            transform: translateY(-2px);
        }
        
        .recipe-card {
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }
        
        .day-card {
            background-color: white;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .day-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        .shopping-item {
            transition: all 0.2s ease;
        }
        
        .shopping-item:hover {
            background-color: #f0f0f0;
        }
        
        .tab-active {
            border-bottom: 3px solid var(--primary);
            color: var(--primary);
            font-weight: 500;
        }
        
        .section {
            display: none;
        }
        
        .section-active {
            display: block;
        }
        
        @media (max-width: 600px) {
            .mobile-flex-col {
                flex-direction: column;
            }
            .mobile-w-full {
                width: 100%;
            }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navbar -->
    <nav class="navbar text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-utensils text-2xl"></i>
                <h1 class="text-xl font-bold">Kukplen</h1>
            </div>
            <div id="auth-buttons" class="flex items-center space-x-4">
                <button id="login-btn" class="text-white px-4 py-2 rounded-lg font-medium">
                    Login
                </button>
                <button id="register-btn" class="bg-white bg-opacity-20 text-white px-4 py-2 rounded-lg font-medium">
                    Register
                </button>
            </div>
            <div id="user-info" class="hidden items-center space-x-4">
                <span id="username-display" class="font-medium"></span>
                <button id="logout-btn" class="p-2 rounded-full bg-white bg-opacity-20">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 py-6 pb-20">
        <!-- Login Section -->
        <div id="login-section" class="section max-w-md mx-auto">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
                <form id="login-form">
                    <div class="mb-4">
                        <label for="login-username" class="block text-gray-700 mb-2">Username</label>
                        <input type="text" id="login-username" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div class="mb-6">
                        <label for="login-password" class="block text-gray-700 mb-2">Password</label>
                        <input type="password" id="login-password" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <button type="submit" class="btn-primary text-white w-full py-3 rounded-lg font-medium">
                        Login
                    </button>
                </form>
            </div>
        </div>

        <!-- Register Section -->
        <div id="register-section" class="section max-w-md mx-auto">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
                <form id="register-form">
                    <div class="mb-4">
                        <label for="register-username" class="block text-gray-700 mb-2">Username</label>
                        <input type="text" id="register-username" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div class="mb-4">
                        <label for="register-password" class="block text-gray-700 mb-2">Password</label>
                        <input type="password" id="register-password" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <div class="mb-6">
                        <label for="register-confirm-password" class="block text-gray-700 mb-2">Confirm Password</label>
                        <input type="password" id="register-confirm-password" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" required>
                    </div>
                    <button type="submit" class="btn-primary text-white w-full py-3 rounded-lg font-medium">
                        Register
                    </button>
                </form>
                <div class="mt-4 text-center">
                    <button id="back-to-login" class="text-primary font-medium">Already have an account? Login</button>
                </div>
            </div>
        </div>

        <!-- Recipes Section -->
        <div id="recipes-section" class="section">
            <div class="mb-6">
                <h2 class="text-2xl font-bold mb-4">Find Your Perfect Recipe</h2>
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <div class="flex-1 relative">
                        <input type="text" id="recipe-search" placeholder="Search recipes by ingredients..." class="w-full p-3 pl-10 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-3.5 text-gray-400"></i>
                    </div>
                    <div class="flex gap-2">
                        <input type="number" id="max-time" placeholder="Max time (min)" class="w-32 p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        <input type="number" id="max-price" placeholder="Max price ($)" class="w-32 p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        <button id="search-btn" class="btn-primary text-white px-6 py-3 rounded-lg font-medium">
                            <i class="fas fa-search mr-2"></i> Search
                        </button>
                    </div>
                </div>
                
                <div id="recipes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Recipes will be dynamically inserted here -->
                </div>
            </div>
        </div>

        <!-- Planner Section -->
        <div id="planner-section" class="section">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Weekly Meal Plan</h2>
                    <div class="flex items-center space-x-2">
                        <span class="text-gray-600">Week of</span>
                        <div class="relative">
                            <input type="date" id="week-date" class="p-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-7 gap-4" id="weekly-plan-container">
                    <!-- Days will be dynamically inserted here -->
                </div>
                
                <div class="mt-8 flex justify-between items-center">
                    <button id="regenerate-plan" class="btn-secondary text-white px-6 py-3 rounded-lg font-medium">
                        <i class="fas fa-sync-alt mr-2"></i> Regenerate Plan
                    </button>
                    <button id="generate-shopping-list" class="btn-primary text-white px-6 py-3 rounded-lg font-medium">
                        Generate Shopping List
                    </button>
                </div>
            </div>
        </div>

        <!-- Shopping List Section -->
        <div id="shopping-section" class="section">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Shopping List</h2>
                    <div class="flex items-center space-x-4">
                        <button class="text-gray-600 hover:text-primary">
                            <i class="fas fa-print"></i>
                        </button>
                        <button class="text-gray-600 hover:text-primary">
                            <i class="fas fa-share-alt"></i>
                        </button>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-medium text-lg">Estimated Total Cost</h3>
                        <span id="total-cost" class="font-bold text-xl text-primary">$0.00</span>
                    </div>
                    <div class="flex justify-between items-center text-sm text-gray-500">
                        <span id="recipe-count">Based on 0 recipes</span>
                        <button class="text-primary hover:underline">View breakdown</button>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm overflow-hidden" id="shopping-list-container">
                    <!-- Shopping list will be dynamically inserted here -->
                </div>
                
                <div class="mt-6 flex justify-between">
                    <button id="update-shopping-list" class="btn-secondary text-white px-6 py-3 rounded-lg font-medium">
                        <i class="fas fa-sync-alt mr-2"></i> Update List
                    </button>
                    <button class="btn-primary text-white px-6 py-3 rounded-lg font-medium">
                        <i class="fas fa-shopping-cart mr-2"></i> Order Online
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg border-t border-gray-200">
        <div class="container mx-auto px-4">
            <div class="flex justify-around">
                <button id="nav-recipes" class="py-3 px-6 text-center text-primary">
                    <i class="fas fa-utensils block text-xl mb-1"></i>
                    <span class="text-xs">Recipes</span>
                </button>
                <button id="nav-planner" class="py-3 px-6 text-center text-gray-400">
                    <i class="fas fa-calendar-alt block text-xl mb-1"></i>
                    <span class="text-xs">Planner</span>
                </button>
                <button id="nav-shopping" class="py-3 px-6 text-center text-gray-400">
                    <i class="fas fa-shopping-basket block text-xl mb-1"></i>
                    <span class="text-xs">Shopping</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Mock database
        const mockUsers = [
            { username: "user1", password: "password1" },
            { username: "user2", password: "password2" }
        ];

        const mockRecipes = [
            {
                id: 1,
                title: "Nasi Goreng",
                readyInMinutes: 20,
                price: 3.50,
                image: "https://images.unsplash.com/photo-1630911427853-1ab0e3b30a9a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8MXx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Nasi", "Telur", "Bawang merah", "Bawang putih", "Kecap manis", "Ayam", "Minyak goreng"]
            },
            {
                id: 2,
                title: "Soto Ayam",
                readyInMinutes: 45,
                price: 4.00,
                image: "https://images.unsplash.com/photo-1633945274417-a3a4a0af0a4a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8Mnx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Ayam", "Bihun", "Kol", "Tauge", "Bawang merah", "Bawang putih", "Kunyit", "Daun salam", "Serai"]
            },
            {
                id: 3,
                title: "Gado-Gado",
                readyInMinutes: 30,
                price: 3.00,
                image: "https://images.unsplash.com/photo-1633945274309-0c3c437d1e0a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8M3x8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Sayuran campur", "Tahu", "Tempe", "Telur", "Kentang", "Bumbu kacang", "Kerupuk"]
            },
            {
                id: 4,
                title: "Rendang",
                readyInMinutes: 120,
                price: 5.50,
                image: "https://images.unsplash.com/photo-1633945274309-0c3c437d1e0a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8M3x8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Daging sapi", "Santan", "Bawang merah", "Bawang putih", "Cabai", "Kunyit", "Jahe", "Lengkuas", "Daun jeruk"]
            },
            {
                id: 5,
                title: "Bakso",
                readyInMinutes: 60,
                price: 4.50,
                image: "https://images.unsplash.com/photo-1633945274309-0c3c437d1e0a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8M3x8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Daging sapi", "Tepung tapioka", "Bawang putih", "Merica", "Garam", "Mie kuning", "Tahu", "Sawi"]
            },
            {
                id: 6,
                title: "Sate Ayam",
                readyInMinutes: 40,
                price: 4.00,
                image: "https://images.unsplash.com/photo-1633945274309-0c3c437d1e0a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8M3x8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Ayam", "Kacang tanah", "Kecap manis", "Bawang putih", "Ketumbar", "Lontong", "Bawang merah"]
            },
            {
                id: 7,
                title: "Sayur Asem",
                readyInMinutes: 35,
                price: 2.50,
                image: "https://images.unsplash.com/photo-1633945274309-0c3c437d1e0a?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxleHBsb3JlLWZlZWR8M3x8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=500&q=60",
                ingredients: ["Labu siam", "Kacang panjang", "Melinjo", "Asam jawa", "Bawang merah", "Bawang putih", "Terong"]
            }
        ];

        // App state
        let currentUser = null;
        const weeklyPlan = {
            "Senin": [],
            "Selasa": [],
            "Rabu": [],
            "Kamis": [],
            "Jumat": [],
            "Sabtu": [],
            "Minggu": []
        };
        const shoppingList = {
            items: {},
            totalCost: 0
        };

        // DOM elements
        const sections = {
            login: document.getElementById('login-section'),
            register: document.getElementById('register-section'),
            recipes: document.getElementById('recipes-section'),
            planner: document.getElementById('planner-section'),
            shopping: document.getElementById('shopping-section')
        };

        const navButtons = {
            recipes: document.getElementById('nav-recipes'),
            planner: document.getElementById('nav-planner'),
            shopping: document.getElementById('nav-shopping')
        };

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            // Set current date for week planner
            const today = new Date();
            document.getElementById('week-date').valueAsDate = today;
            
            // Show login section by default
            showSection('login');
            
            // Load mock recipes
            displayRecipes(mockRecipes);
            
            // Initialize weekly plan display
            updateWeeklyPlanDisplay();
            
            // Event listeners
            setupEventListeners();
        });

        function setupEventListeners() {
            // Auth buttons
            document.getElementById('login-btn').addEventListener('click', () => showSection('login'));
            document.getElementById('register-btn').addEventListener('click', () => showSection('register'));
            document.getElementById('back-to-login').addEventListener('click', () => showSection('login'));
            document.getElementById('logout-btn').addEventListener('click', logout);
            
            // Forms
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('register-form').addEventListener('submit', handleRegister);
            
            // Navigation
            navButtons.recipes.addEventListener('click', () => {
                if (currentUser) showSection('recipes');
            });
            navButtons.planner.addEventListener('click', () => {
                if (currentUser) showSection('planner');
            });
            navButtons.shopping.addEventListener('click', () => {
                if (currentUser) showSection('shopping');
            });
            
            // Recipe search
            document.getElementById('search-btn').addEventListener('click', searchRecipes);
            
            // Planner actions
            document.getElementById('regenerate-plan').addEventListener('click', regeneratePlan);
            document.getElementById('generate-shopping-list').addEventListener('click', generateShoppingList);
            document.getElementById('update-shopping-list').addEventListener('click', updateShoppingList);
        }

        function showSection(sectionName) {
            // Hide all sections
            Object.values(sections).forEach(section => {
                section.classList.remove('section-active');
            });
            
            // Show the selected section
            sections[sectionName].classList.add('section-active');
            
            // Update nav buttons
            Object.values(navButtons).forEach(button => {
                button.classList.remove('text-primary');
                button.classList.add('text-gray-400');
            });
            
            // If showing a main section (not login/register), highlight the nav button
            if (sectionName === 'recipes' || sectionName === 'planner' || sectionName === 'shopping') {
                navButtons[sectionName].classList.add('text-primary');
                navButtons[sectionName].classList.remove('text-gray-400');
            }
            
            // Show/hide auth buttons based on login state
            if (sectionName === 'login' || sectionName === 'register') {
                document.getElementById('auth-buttons').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
            } else if (currentUser) {
                document.getElementById('auth-buttons').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('username-display').textContent = currentUser.username;
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }
            
            const user = mockUsers.find(u => u.username === username && u.password === password);
            
            if (user) {
                currentUser = { username };
                showNotification(`Welcome back, ${username}!`);
                showSection('recipes');
                document.getElementById('login-form').reset();
            } else {
                alert('Invalid username or password');
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            if (!username || !password || !confirmPassword) {
                alert('Please fill in all fields');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (mockUsers.some(u => u.username === username)) {
                alert('Username already exists');
                return;
            }
            
            mockUsers.push({ username, password });
            currentUser = { username };
            showNotification(`Account created for ${username}!`);
            showSection('recipes');
            document.getElementById('register-form').reset();
        }

        function logout() {
            currentUser = null;
            showSection('login');
            showNotification('Logged out successfully');
        }

        function displayRecipes(recipes) {
            const container = document.getElementById('recipes-container');
            container.innerHTML = '';
            
            if (recipes.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 col-span-3 py-8">No recipes found matching your criteria</p>';
                return;
            }
            
            recipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card bg-white rounded-xl overflow-hidden';
                card.innerHTML = `
                    <div class="h-40 bg-cover bg-center" style="background-image: url('${recipe.image}');"></div>
                    <div class="p-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">${recipe.title}</h3>
                            <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full">${recipe.readyInMinutes <= 30 ? 'Easy' : recipe.readyInMinutes <= 60 ? 'Medium' : 'Hard'}</span>
                        </div>
                        <div class="flex items-center text-sm text-gray-500 mb-3">
                            <i class="fas fa-clock mr-1"></i>
                            <span>${recipe.readyInMinutes} mins</span>
                            <i class="fas fa-dollar-sign ml-3 mr-1"></i>
                            <span>${recipe.price.toFixed(2)}</span>
                        </div>
                        <div class="mb-3">
                            <p class="text-sm text-gray-600">Ingredients: ${recipe.ingredients.slice(0, 3).join(', ')}${recipe.ingredients.length > 3 ? '...' : ''}</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <button class="btn-primary text-white px-3 py-1 rounded-full text-sm add-to-planner" data-id="${recipe.id}">
                                <i class="fas fa-plus mr-1"></i> Add to Plan
                            </button>
                            <button class="text-primary font-medium text-sm view-recipe" data-id="${recipe.id}">
                                View Details
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            // Add event listeners to the new buttons
            document.querySelectorAll('.add-to-planner').forEach(button => {
                button.addEventListener('click', function() {
                    const recipeId = parseInt(this.getAttribute('data-id'));
                    const recipe = mockRecipes.find(r => r.id === recipeId);
                    showAddToPlanModal(recipe);
                });
            });
        }

        function searchRecipes() {
            const searchTerm = document.getElementById('recipe-search').value.toLowerCase();
            const maxTime = parseInt(document.getElementById('max-time').value) || 999;
            const maxPrice = parseFloat(document.getElementById('max-price').value) || 999;
            
            console.log(`Searching recipes with criteria: ingredients=${searchTerm}, maxTime=${maxTime}, maxPrice=${maxPrice}`);
            
            const filteredRecipes = mockRecipes.filter(recipe => {
                // Filter by time
                if (recipe.readyInMinutes > maxTime) return false;
                
                // Filter by price
                if (recipe.price > maxPrice) return false;
                
                // Filter by ingredients if search term exists
                if (searchTerm) {
                    const searchIngredients = searchTerm.split(',').map(i => i.trim().toLowerCase());
                    return searchIngredients.every(ingredient => 
                        recipe.ingredients.some(i => i.toLowerCase().includes(ingredient))
                }
                
                return true;
            });
            
            console.log(`Found ${filteredRecipes.length} matching recipes`);
            displayRecipes(filteredRecipes);
        }

        function showAddToPlanModal(recipe) {
            // Create modal HTML
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg p-6 w-full max-w-md">
                    <h3 class="text-xl font-bold mb-4">Add ${recipe.title} to Plan</h3>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Day</label>
                        <select id="plan-day" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            <option value="Senin">Senin</option>
                            <option value="Selasa">Selasa</option>
                            <option value="Rabu">Rabu</option>
                            <option value="Kamis">Kamis</option>
                            <option value="Jumat">Jumat</option>
                            <option value="Sabtu">Sabtu</option>
                            <option value="Minggu">Minggu</option>
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2">Servings</label>
                        <input type="number" id="plan-servings" min="1" value="2" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button id="cancel-add-plan" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700">Cancel</button>
                        <button id="confirm-add-plan" class="btn-primary text-white px-4 py-2 rounded-lg" data-id="${recipe.id}">Add to Plan</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Add event listeners
            document.getElementById('cancel-add-plan').addEventListener('click', () => {
                modal.remove();
            });
            
            document.getElementById('confirm-add-plan').addEventListener('click', function() {
                const recipeId = parseInt(this.getAttribute('data-id'));
                const day = document.getElementById('plan-day').value;
                const servings = parseInt(document.getElementById('plan-servings').value);
                
                addMealToPlan(recipeId, day, servings);
                modal.remove();
                showNotification(`Added ${recipe.title} to ${day}'s plan`);
            });
        }

        function addMealToPlan(recipeId, day, servings) {
            const recipe = mockRecipes.find(r => r.id === recipeId);
            
            weeklyPlan[day].push({
                recipeId: recipe.id,
                title: recipe.title,
                servings: servings,
                ingredients: recipe.ingredients
            });
            
            updateWeeklyPlanDisplay();
        }

        function updateWeeklyPlanDisplay() {
            const container = document.getElementById('weekly-plan-container');
            container.innerHTML = '';
            
            Object.entries(weeklyPlan).forEach(([day, meals]) => {
                const dayCard = document.createElement('div');
                dayCard.className = 'day-card p-4';
                
                let mealsHtml = '';
                if (meals.length > 0) {
                    meals.forEach((meal, index) => {
                        mealsHtml += `
                            <div class="p-3 bg-gray-50 rounded-lg mb-2">
                                <div class="flex justify-between items-start mb-1">
                                    <h4 class="font-medium">${meal.title}</h4>
                                    <button class="text-gray-400 hover:text-red-500 remove-meal" data-day="${day}" data-index="${index}">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                                <div class="flex items-center text-xs text-gray-500">
                                    <i class="fas fa-user-friends mr-1"></i>
                                    <span>${meal.servings} people</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    mealsHtml = `
                        <div class="p-4 bg-gray-100 rounded-lg text-center text-gray-500">
                            <i class="fas fa-utensils text-2xl mb-2"></i>
                            <p>No meals planned</p>
                        </div>
                    `;
                }
                
                dayCard.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-lg ${day === 'Senin' || day === 'Rabu' || day === 'Jumat' || day === 'Minggu' ? 'text-primary' : 'text-secondary'}">${day}</h3>
                        <button class="text-gray-400 hover:text-primary add-meal" data-day="${day}">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div class="space-y-2">
                        ${mealsHtml}
                    </div>
                `;
                
                container.appendChild(dayCard);
            });
            
            // Add event listeners to remove buttons
            document.querySelectorAll('.remove-meal').forEach(button => {
                button.addEventListener('click', function() {
                    const day = this.getAttribute('data-day');
                    const index = parseInt(this.getAttribute('data-index'));
                    weeklyPlan[day].splice(index, 1);
                    updateWeeklyPlanDisplay();
                    showNotification('Meal removed from plan');
                });
            });
            
            // Add event listeners to add buttons
            document.querySelectorAll('.add-meal').forEach(button => {
                button.addEventListener('click', function() {
                    const day = this.getAttribute('data-day');
                    showRecipeSelectionModal(day);
                });
            });
        }

        function showRecipeSelectionModal(day) {
            // Create modal HTML
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg p-6 w-full max-w-md">
                    <h3 class="text-xl font-bold mb-4">Add Meal to ${day}</h3>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2">Recipe</label>
                        <select id="select-recipe" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                            ${mockRecipes.map(recipe => `<option value="${recipe.id}">${recipe.title}</option>`).join('')}
                        </select>
                    </div>
                    <div class="mb-6">
                        <label class="block text-gray-700 mb-2">Servings</label>
                        <input type="number" id="select-servings" min="1" value="2" class="w-full p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                    <div class="flex justify-end space-x-3">
                        <button id="cancel-select-recipe" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700">Cancel</button>
                        <button id="confirm-select-recipe" class="btn-primary text-white px-4 py-2 rounded-lg" data-day="${day}">Add to Plan</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Add event listeners
            document.getElementById('cancel-select-recipe').addEventListener('click', () => {
                modal.remove();
            });
            
            document.getElementById('confirm-select-recipe').addEventListener('click', function() {
                const day = this.getAttribute('data-day');
                const recipeId = parseInt(document.getElementById('select-recipe').value);
                const servings = parseInt(document.getElementById('select-servings').value);
                
                addMealToPlan(recipeId, day, servings);
                modal.remove();
            });
        }

        function regeneratePlan() {
            // Clear current plan
            Object.keys(weeklyPlan).forEach(day => {
                weeklyPlan[day] = [];
            });
            
            // Add some random meals to the plan
            const days = Object.keys(weeklyPlan);
            const randomRecipes = [...mockRecipes].sort(() => 0.5 - Math.random()).slice(0, 5);
            
            randomRecipes.forEach((recipe, index) => {
                const day = days[index % days.length];
                weeklyPlan[day].push({
                    recipeId: recipe.id,
                    title: recipe.title,
                    servings: Math.floor(Math.random() * 3) + 1, // 1-3 servings
                    ingredients: recipe.ingredients
                });
            });
            
            updateWeeklyPlanDisplay();
            showNotification('Generated new weekly plan');
        }

        function generateShoppingList() {
            // Clear current shopping list
            shoppingList.items = {};
            shoppingList.totalCost = 0;
            
            // Count all ingredients from the weekly plan
            Object.values(weeklyPlan).forEach(meals => {
                meals.forEach(meal => {
                    meal.ingredients.forEach(ingredient => {
                        if (shoppingList.items[ingredient]) {
                            shoppingList.items[ingredient] += meal.servings;
                        } else {
                            shoppingList.items[ingredient] = meal.servings;
                        }
                    });
                });
            });
            
            // Calculate total cost (using random prices for demo)
            shoppingList.totalCost = 0;
            Object.keys(shoppingList.items).forEach(ingredient => {
                const price = (Math.random() * 5 + 1).toFixed(2); // Random price between 1-6
                shoppingList.totalCost += parseFloat(price) * shoppingList.items[ingredient];
            });
            
            updateShoppingListDisplay();
            showSection('shopping');
            showNotification('Generated shopping list');
        }

        function updateShoppingList() {
            generateShoppingList();
            showNotification('Shopping list updated');
        }

        function updateShoppingListDisplay() {
            const container = document.getElementById('shopping-list-container');
            const totalRecipes = Object.values(weeklyPlan).reduce((total, meals) => total + meals.length, 0);
            
            // Update summary
            document.getElementById('total-cost').textContent = `$${shoppingList.totalCost.toFixed(2)}`;
            document.getElementById('recipe-count').textContent = `Based on ${totalRecipes} recipes`;
            
            // Group ingredients by category (for demo, we'll just use a few categories)
            const categories = {
                "Vegetables": [],
                "Meat & Fish": [],
                "Dry Goods": [],
                "Dairy & Eggs": [],
                "Spices": []
            };
            
            // Categorize ingredients (simple demo categorization)
            Object.entries(shoppingList.items).forEach(([ingredient, quantity]) => {
                if (ingredient.includes('Ayam') || ingredient.includes('Daging') || ingredient.includes('Ikan')) {
                    categories["Meat & Fish"].push({ ingredient, quantity });
                } else if (ingredient.includes('Bawang') || ingredient.includes('Cabai') || ingredient.includes('Sayur')) {
                    categories["Vegetables"].push({ ingredient, quantity });
                } else if (ingredient.includes('Telur') || ingredient.includes('Santan')) {
                    categories["Dairy & Eggs"].push({ ingredient, quantity });
                } else if (ingredient.includes('Garam') || ingredient.includes('Merica') || ingredient.includes('Kunyit')) {
                    categories["Spices"].push({ ingredient, quantity });
                } else {
                    categories["Dry Goods"].push({ ingredient, quantity });
                }
            });
            
            // Generate HTML for each category
            let html = '';
            
            Object.entries(categories).forEach(([category, items]) => {
                if (items.length === 0) return;
                
                html += `
                    <div class="border-b border-gray-200">
                        <div class="flex items-center px-4 py-3 bg-gray-50">
                            <i class="fas ${getCategoryIcon(category)} text-primary mr-3"></i>
                            <h3 class="font-medium">${category}</h3>
                        </div>
                        
                        <div class="divide-y divide-gray-200">
                            ${items.map(item => `
                                <div class="shopping-item px-4 py-3 flex items-center">
                                    <div class="flex items-center mr-4">
                                        <input type="checkbox" class="rounded text-primary focus:ring-primary h-5 w-5">
                                    </div>
                                    <div class="flex-1">
                                        <div class="font-medium">${item.ingredient}</div>
                                        <div class="text-sm text-gray-500">${item.quantity} ${item.quantity > 1 ? 'items' : 'item'}</div>
                                    </div>
                                    <div class="text-primary font-medium">$${(Math.random() * 5 + 1).toFixed(2)}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // Add event listeners to checkboxes
            document.querySelectorAll('.shopping-item input[type="checkbox"]').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const item = this.closest('.shopping-item');
                    if (this.checked) {
                        item.classList.add('line-through', 'text-gray-400');
                    } else {
                        item.classList.remove('line-through', 'text-gray-400');
                    }
                });
            });
        }

        function getCategoryIcon(category) {
            switch(category) {
                case 'Vegetables': return 'fa-carrot';
                case 'Meat & Fish': return 'fa-drumstick-bite';
                case 'Dry Goods': return 'fa-shopping-basket';
                case 'Dairy & Eggs': return 'fa-egg';
                case 'Spices': return 'fa-mortar-pestle';
                default: return 'fa-shopping-basket';
            }
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-primary text-white px-4 py-2 rounded-lg shadow-lg flex items-center';
            notification.innerHTML = `
                <i class="fas fa-check-circle mr-2"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.classList.add('opacity-0', 'transition-opacity', 'duration-300');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
